<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Validation GesLyCo-X</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #f59e0b;
        }

        .card.valid {
            border-left-color: #22c55e;
            opacity: 0.7;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .code {
            font-size: 1.2rem;
            font-weight: 800;
            color: #1e40af;
            background: #eff6ff;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .school {
            font-weight: 700;
            font-size: 1rem;
        }

        .details {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 5px;
        }

        .btn-valider {
            background: #22c55e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-valid {
            background: #dcfce7;
            color: #166534;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>

<body>
    <div class="container">
        <h1>Validation des Accès</h1>
        <div id="list">Chargement des demandes...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsfdxUlDU2u40FwKZZUyOgLb-Xbv2oG88",
            authDomain: "formation-windev-d7154.firebaseapp.com",
            projectId: "formation-windev-d7154",
            storageBucket: "formation-windev-d7154.firebasestorage.app",
            messagingSenderId: "623154355246",
            appId: "1:623154355246:web:7a59ad63589f8cb97093bf"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function validerAccess(docId) {
            if (confirm("Valider cet accès ?")) {
                db.collection("inscriptions_logiciel_v1").doc(docId).update({
                    status: "valide"
                }).then(() => alert("Accès validé !"));
            }
        }

        db.collection("inscriptions_logiciel_v1").orderBy("date", "desc").limit(20).onSnapshot((snap) => {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";

            if (snap.empty) {
                listDiv.innerHTML = '<div class="empty">Aucune demande d\'inscription.</div>';
                return;
            }

            snap.forEach(doc => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = `card ${data.status === 'valide' ? 'valid' : ''}`;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="school">${data.nomEcole}</span>
                        <span class="code">${data.code}</span>
                    </div>
                    <div class="details">
                        Directeur : ${data.nomDirecteur}<br>
                        📞 ${data.contact} | 📍 ${data.region}
                    </div>
                    <div style="margin-top:10px">
                        <span class="status-badge ${data.status === 'valide' ? 'status-valid' : 'status-pending'}">
                            ${data.status === 'valide' ? '✅ Validé' : '⏳ En attente'}
                        </span>
                    </div>
                    ${data.status !== 'valide' ? `<button class="btn-valider" onclick="validerAccess('${doc.id}')">VALIDER L'ACCÈS</button>` : ''}
                `;
                listDiv.appendChild(card);
            });
        });
    </script>
</body>

</html>
